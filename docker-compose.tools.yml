services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: circleguard-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # Mapeo del config de K8s para que el usuario jenkins lo encuentre
      - ${HOME}/.kube/config:/var/jenkins_home/.kube/config
    restart: unless-stopped

volumes:
  jenkins_home: