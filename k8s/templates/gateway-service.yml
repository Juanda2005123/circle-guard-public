# ============================================================
# Gateway Service — Kubernetes Manifests
# Namespace  : ${NAMESPACE}
# Image Tag  : ${IMAGE_TAG}
# Registry   : ${DOCKER_REGISTRY}
# Replaced by Jenkins pipeline via envsubst
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service-deployment
  namespace: ${NAMESPACE}
  labels:
    app: gateway-service
    team: dream-team
    version: "${IMAGE_TAG}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
        team: dream-team
        version: "${IMAGE_TAG}"
    spec:
      containers:
        - name: gateway-service
          image: ${DOCKER_REGISTRY}/circleguard-gateway-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: ${NAMESPACE}
  labels:
    app: gateway-service
    team: dream-team
spec:
  type: NodePort
  selector:
    app: gateway-service
  ports:
    - name: http
      protocol: TCP
      port: 8087
      targetPort: 8087
      nodePort: 30087
