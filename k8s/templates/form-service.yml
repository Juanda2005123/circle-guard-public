# ============================================================
# Form Service — Kubernetes Manifests
# Namespace  : ${NAMESPACE}
# Image Tag  : ${IMAGE_TAG}
# Registry   : ${DOCKER_REGISTRY}
# Replaced by Jenkins pipeline via envsubst
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: form-service-deployment
  namespace: ${NAMESPACE}
  labels:
    app: form-service
    team: dream-team
    version: "${IMAGE_TAG}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: form-service
  template:
    metadata:
      labels:
        app: form-service
        team: dream-team
        version: "${IMAGE_TAG}"
    spec:
      containers:
        - name: form-service
          image: ${DOCKER_REGISTRY}/circleguard-form-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/circleguard_form"
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: form-service
  namespace: ${NAMESPACE}
  labels:
    app: form-service
    team: dream-team
spec:
  type: ClusterIP
  selector:
    app: form-service
  ports:
    - name: http
      protocol: TCP
      port: 8086
      targetPort: 8086
