# ============================================================
# Neo4j — Kubernetes Infrastructure Manifests
# Namespace  : ${NAMESPACE}
# Credentials: neo4j / password
# Includes   : PVC + Deployment + Service
# ============================================================

# --- 1. PersistentVolumeClaim ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-pvc
  namespace: ${NAMESPACE}
  labels:
    app: neo4j
    team: dream-team
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# --- 2. Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-deployment
  namespace: ${NAMESPACE}
  labels:
    app: neo4j
    team: dream-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        team: dream-team
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            # Desactiva servidores de actualización para entornos offline/kind
            - name: NEO4J_server_allow__upgrade
              value: "true"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-pvc

---
# --- 3. Service (ClusterIP) ---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: ${NAMESPACE}
  labels:
    app: neo4j
    team: dream-team
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
    - name: http
      protocol: TCP
      port: 7474
      targetPort: 7474
    - name: bolt
      protocol: TCP
      port: 7687
      targetPort: 7687
