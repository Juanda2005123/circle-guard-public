# ============================================================
# OpenLDAP — Kubernetes Infrastructure Manifests
# Namespace  : ${NAMESPACE}
# Usado por  : auth-service (SPRING_LDAP_URLS)
# ============================================================

# --- 1. Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap-deployment
  namespace: ${NAMESPACE}
  labels:
    app: openldap
    team: dream-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
        team: dream-team
    spec:
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 389
              name: ldap
            - containerPort: 636
              name: ldaps
          env:
            - name: LDAP_ORGANISATION
              value: "CircleGuard"
            - name: LDAP_DOMAIN
              value: "circleguard.edu"
            - name: LDAP_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

---
# --- 2. Service (ClusterIP) ---
apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: ${NAMESPACE}
  labels:
    app: openldap
    team: dream-team
spec:
  type: ClusterIP
  selector:
    app: openldap
  ports:
    - name: ldap
      protocol: TCP
      port: 389
      targetPort: 389
    - name: ldaps
      protocol: TCP
      port: 636
      targetPort: 636
